<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thư chúc 20/10 💌</title>
  <style>
    body {
      font-family: "Poppins", sans-serif;
      background: radial-gradient(circle at center, #1a001a, #000);
      overflow: hidden;
      margin: 0;
      padding: 0;
      height: 100vh;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      width: 2px;
      height: 2px;
      opacity: 0.8;
      animation: twinkle 2s infinite alternate;
    }

    @keyframes twinkle {
      from { opacity: 0.2; }
      to { opacity: 1; }
    }

    .shooting-star {
      position: absolute;
      width: 2px;
      height: 80px;
      background: linear-gradient(white, transparent);
      opacity: 0.8;
    }

    @keyframes move-diagonal-right {
      from { transform: translate(0,0) rotate(-45deg); opacity: 1; }
      to { transform: translate(800px, 800px) rotate(-45deg); opacity: 0; }
    }

    .heart {
      position: absolute;
      color: #ff66b2;
      text-shadow: 0 0 15px #ff99cc, 0 0 30px pink;
      opacity: 0.9;
      animation: floatUp 7s ease-in forwards;
    }

    @keyframes floatUp {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      70% { opacity: 0.9; transform: translateY(-600px) scale(1.2); }
      100% { transform: translateY(-800px) scale(0.8); opacity: 0; }
    }

    .particle {
      position: absolute;
      width: 15px;
      height: 15px;
      background: radial-gradient(circle, rgba(255,255,255,0.9), rgba(255,192,203,0.2));
      border-radius: 50%;
      box-shadow: 0 0 15px white, 0 0 30px pink;
      opacity: 0.8;
      animation: particleMove 6s ease-in-out forwards;
    }

    @keyframes particleMove {
      0% { transform: translate(0,0) scale(1); opacity: 1; }
      50% { transform: translate(calc(-50px + 100px * var(--x)), -300px) scale(1.3); opacity: 0.8; }
      100% { transform: translate(calc(-100px + 200px * var(--x)), -600px) scale(0.8); opacity: 0; }
    }

    .glow {
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(255,182,193,0.4), transparent);
      border-radius: 50%;
      filter: blur(50px);
      animation: moveGlow 10s linear infinite alternate;
    }

    @keyframes moveGlow {
      0% { transform: translate(10vw, 10vh); }
      50% { transform: translate(60vw, 40vh); }
      100% { transform: translate(30vw, 70vh); }
    }

    .message {
      position: absolute;
      text-align: center;
      font-size: 40px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 1.5s;
      text-shadow: 0 0 10px pink, 0 0 20px violet;
    }

    .photo {
      position: absolute;
      top: 22%;
      left: 50%;
      transform: translateX(-50%) scale(0.8);
      width: 200px;
      height: 200px;
      object-fit: cover;
      border-radius: 50%;
      border: 3px solid rgba(255, 255, 255, 0.7);
      box-shadow: 0 0 25px pink, 0 0 50px violet;
      opacity: 0;
      transition: all 1.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-50%) scale(0.8); }
      to { opacity: 1; transform: translateX(-50%) scale(1); }
    }

    .card {
      position: absolute;
      top: 60%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-radius: 20px;
      padding: 40px;
      width: 70%;
      max-width: 600px;
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 40px rgba(255, 182, 193, 0.8);
      opacity: 0;
      transition: all 1.5s ease;
    }

    .card h1 {
     color: #ff69b4;
     margin-bottom: 20px;
     font-size: 48px; 
     font-weight: 700;
     letter-spacing: 2px;
     text-shadow: 0 0 15px #ff69b4, 0 0 25px violet, 0 0 40px hotpink;
     animation: glow 2s ease-in-out infinite alternate;
    }

    @keyframes glow {
     from { text-shadow: 0 0 10px #ff69b4, 0 0 20px violet; }
     to { text-shadow: 0 0 25px hotpink, 0 0 50px violet; }
    }

    .card p {
      font-size: 18px;
      line-height: 1.6;
      color: white;
      text-shadow: 0 0 5px #ffb6c1;
    }
  </style>
</head>
<body>

  <div class="glow"></div>
  
  <div class="message" id="msg1">💖 Ô hôm nay là ngày gì thế nhỉ...</div>
  <div class="message" id="msg2">🌸 Ai biết !!</div>
  <div class="message" id="msg3">💐 Ủa, chẳng phải hôm nay là 20/10 sao?</div>
  <div class="message" id="msg4">🌷 20 tháng 10 là ngày gì nhỉ?</div>
  <div class="message" id="msg5">💞 Là ngày Phụ nữ Việt Nam 🥰</div>

  <!-- 🌹 ẢNH ĐƯỢC THÊM Ở ĐÂY -->
  <img src="anh_cua_co.jpg" alt="Cô giáo thân yêu" class="photo">

  <div class="card" id="loveLetter">
    <h1>CHÚC MỪNG NGÀY PHỤ NỮ VIỆT NAM 20/10 💌</h1>
    <p id="letterText"></p>
  </div>

  <script>
    for(let i=0; i<150; i++){
      let star = document.createElement("div");
      star.className = "star";
      star.style.top = Math.random()*100 + "vh";
      star.style.left = Math.random()*100 + "vw";
      document.body.appendChild(star);
    }

    function createShootingStar() {
      let shooting = document.createElement("div");
      shooting.className = "shooting-star";
      shooting.style.top = Math.random() * 40 + "vh";   
      shooting.style.left = Math.random() * 40 + "vw";  
      let duration = (1.5 + Math.random()*1.5) + "s";
      shooting.style.animation = `move-diagonal-right ${duration} linear forwards`;
      shooting.addEventListener("animationend", () => shooting.remove());
      document.body.appendChild(shooting);
    }
    setInterval(createShootingStar, 2500);

    function createHeart() {
      let heart = document.createElement("div");
      heart.className = "heart";
      heart.innerHTML = "💖";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.bottom = "0px";
      heart.style.fontSize = 25 + Math.random() * 40 + "px";
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 7000);
    }
    setInterval(createHeart, 300);

    function createParticle() {
      let p = document.createElement("div");
      p.className = "particle";
      p.style.left = Math.random() * 100 + "vw";
      p.style.bottom = "0px";
      p.style.setProperty("--x", Math.random());
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 6000);
    }
    setInterval(createParticle, 250);

    const messages = document.querySelectorAll('.message');
    messages.forEach((msg, index) => {
      setTimeout(() => msg.style.opacity = 1, 2000 * index);
      setTimeout(() => msg.style.opacity = 0, 2000 * (index + 1.5));
    });

    setTimeout(() => {
      const letter = document.getElementById('loveLetter');
      const photo = document.querySelector('.photo');
      letter.style.opacity = 1;
      letter.style.transform = "translate(-50%, -50%) scale(1)";
      photo.style.opacity = 1;
      photo.style.transform = "translateX(-50%) scale(1)";

      const text = "Một mùa phượng nở, một mùa qua, Trang kỷ niệm khép mở trang hoa. Nụ cười năm ấy nhòe mi mắt, Bóng hình cô vẫn đọng trong ta...   Nhân ngày Phụ nữ Việt Nam 20/10, em thay mặt tập thể lớp 12B xin gửi đến cô lời chúc chân thành nhất!  Chúc cô luôn mạnh khỏe, hạnh phúc, và mãi giữ nụ cười hiền hậu. Cảm ơn cô trong suốt 3 năm học vừa qua đã tận tâm và thương yêu chúng em trong quãng thời gian đẹp nhất của tuổi học sinh. Dù giờ đây 12B đã mỗi người một hướng, mỗi người một công việc riêng của mình nhưng ai cũng đang cố gắng thực hiện ước mơ. Một lần nữa, chúc cô có nhiều sức khỏe, nhiệt huyết và mãi vui vẻ như ngày nào ❤️";
      const letterText = document.getElementById('letterText');
      let i = 0;
      function typeEffect() {
        if (i < text.length) {
          letterText.innerHTML += text.charAt(i);
          i++;
          setTimeout(typeEffect, 45);
        }
      }
      typeEffect();
    }, 13000);
  </script>
</body>
</html>
